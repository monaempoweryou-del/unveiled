  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #C9922A;
      --gold-light: #E8B44A;
      --gold-pale: #FDF4E3;
      --dark: #141414;
      --dark-2: #1E1E1E;
      --dark-3: #2A2A2A;
      --mid: #4A4A4A;
      --light: #F7F5F2;
      --white: #FFFFFF;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
      --shadow-lg: 0 24px 64px rgba(0,0,0,0.18);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--light);
      color: var(--dark);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- NAV ---- */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201, 146, 42, 0.15);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-logo-text {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .nav-logo-text span {
      color: var(--gold-light);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 32px;
    }

    @media (min-width: 768px) {
      .nav-links {
        display: flex;
      }
    }

    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color var(--transition);
    }

    .nav-links a:hover {
      color: var(--gold-light);
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--dark) !important;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 700 !important;
      font-size: 14px !important;
      text-decoration: none;
      transition: opacity var(--transition), transform var(--transition);
      display: inline-block;
    }

    .nav-cta:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ---- HERO ---- */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding-top: 68px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=1800&q=85');
      background-size: cover;
      background-position: center;
      transform: scale(1.03);
      transition: transform 8s ease;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(14, 12, 8, 0.85) 0%,
        rgba(14, 12, 8, 0.65) 50%,
        rgba(14, 12, 8, 0.4) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 24px 100px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201, 146, 42, 0.18);
      border: 1px solid rgba(201, 146, 42, 0.4);
      color: var(--gold-light);
      padding: 7px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .hero-badge::before {
      content: '★';
      font-size: 11px;
    }

    .hero h1 {
      font-size: clamp(2.6rem, 6vw, 4.8rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.08;
      letter-spacing: -1.5px;
      max-width: 760px;
      margin-bottom: 24px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--gold-light);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255,255,255,0.8);
      max-width: 540px;
      margin-bottom: 44px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--dark);
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 4px 20px rgba(201, 146, 42, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201, 146, 42, 0.5);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      padding: 15px 28px;
      border-radius: 50px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: background var(--transition), border-color var(--transition);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
    }

    .hero-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      margin-top: 72px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
    }

    .hero-stat-number {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--gold-light);
      letter-spacing: -1px;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ---- TRUST BAR ---- */
    .trust-bar {
      background: var(--dark);
      padding: 20px 24px;
    }

    .trust-bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      align-items: center;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 13.5px;
      font-weight: 500;
    }

    .trust-item-icon {
      color: var(--gold-light);
      font-size: 15px;
    }

    /* ---- SECTION BASE ---- */
    section {
      padding: 96px 24px;
    }

    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .section-title {
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .section-sub {
      font-size: 1.1rem;
      color: var(--mid);
      line-height: 1.75;
      max-width: 580px;
    }

    /* ---- SERVICES ---- */
    .services {
      background: var(--white);
    }

    .services-header {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 60px;
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 600px) {
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .services-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .service-card {
      background: var(--light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .service-card-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .service-card-body {
      padding: 28px;
    }

    .service-card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 18px;
      margin-top: -42px;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 16px rgba(201, 146, 42, 0.3);
    }

    .service-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .service-card p {
      font-size: 0.95rem;
      color: var(--mid);
      line-height: 1.65;
    }

    /* ---- WHY US ---- */
    .why {
      background: var(--light);
    }

    .why-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
    }

    @media (min-width: 900px) {
      .why-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .why-image-wrap {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .why-image-wrap img {
      width: 100%;
      height: 480px;
      object-fit: cover;
      display: block;
      border-radius: var(--radius-lg);
    }

    .why-badge-float {
      position: absolute;
      bottom: 28px;
      left: 28px;
      background: var(--dark);
      color: var(--white);
      padding: 16px 22px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-lg);
      max-width: 240px;
    }

    .why-badge-float-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .why-badge-float-text strong {
      display: block;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--gold-light);
    }

    .why-badge-float-text span {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }

    .why-features {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .why-feature {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .why-feature-icon {
      width: 50px;
      height: 50px;
      background: var(--gold-pale);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 1px solid rgba(201, 146, 42, 0.2);
    }

    .why-feature-text h4 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .why-feature-text p {
      font-size: 0.92rem;
      color: var(--mid);
      line-height: 1.65;
    }

    /* ---- PROCESS ---- */
    .process {
      background: var(--dark);
      color: var(--white);
    }

    .process .section-title {
      color: var(--white);
    }

    .process .section-sub {
      color: rgba(255,255,255,0.65);
    }

    .process-header {
      text-align: center;
      margin-bottom: 64px;
    }

    .process-steps {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
    }

    @media (min-width: 768px) {
      .process-steps {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .process-step {
      background: var(--dark-2);
      padding: 36px 28px;
      border-radius: 0;
      position: relative;
      transition: background var(--transition);
    }

    .process-step:first-child {
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }

    .process-step:last-child {
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }

    @media (max-width: 767px) {
      .process-step:first-child {
        border-radius: var(--radius-md) var(--radius-md) 0 0;
      }
      .process-step:last-child {
        border-radius: 0 0 var(--radius-md) var(--radius-md);
      }
    }

    .process-step:hover {
      background: var(--dark-3);
    }

    .process-step-num {
      font-size: 3rem;
      font-weight: 900;
      color: rgba(201, 146, 42, 0.18);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }

    .process-step-icon {
      font-size: 26px;
      margin-bottom: 16px;
    }

    .process-step h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .process-step p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.65;
    }

    .process-connector {
      display: none;
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: var(--gold);
      border-radius: 50%;
      z-index: 1;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--dark);
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .process-step:not(:last-child) .process-connector {
        display: flex;
      }
    }

    /* ---- GALLERY ---- */
    .gallery {
      background: var(--white);
    }

    .gallery-header {
      margin-bottom: 48px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .gallery-item {
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
      aspect-ratio: 4/3;
    }

    .gallery-item:nth-child(1) {
      grid-column: span 2;
      aspect-ratio: 16/9;
    }

    @media (min-width: 768px) {
      .gallery-item:nth-child(1) {
        grid-column: span 2;
        grid-row: span 1;
      }
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    .gallery-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(14,12,8,0.6) 0%, transparent 60%);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }

    .gallery-item:hover .gallery-item-overlay {
      opacity: 1;
    }

    .gallery-item-label {
      color: var(--white);
      font-size: 13px;
      font-weight: 600;
    }

    /* ---- TESTIMONIALS ---- */
    .testimonials {
      background: var(--gold-pale);
    }

    .testimonials-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .testimonials-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .testimonial-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: box-shadow var(--transition), transform var(--transition);
      border: 1px solid rgba(201, 146, 42, 0.1);
    }

    .testimonial-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
    }

    .testimonial-stars {
      color: var(--gold);
      font-size: 16px;
      letter-spacing: 2px;
    }

    .testimonial-text {
      font-size: 1rem;
      color: var(--dark);
      line-height: 1.75;
      font-style: italic;
      flex-grow: 1;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .testimonial-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      font-weight: 700;
      color: var(--dark);
    }

    .testimonial-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--dark);
    }

    .testimonial-role {
      font-size: 0.82rem;
      color: var(--mid);
    }

    /* ---- CTA SECTION ---- */
    .cta-section {
      background: linear-gradient(135deg, var(--dark) 0%, #1A1208 100%);
      position: relative;
      overflow: hidden;
      padding: 96px 24px;
    }

    .cta-section::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201, 146, 42, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-inner {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .cta-inner .section-label {
      color: var(--gold-light);
    }

    .cta-inner .section-title {
      color: var(--white);
    }

    .cta-inner .section-sub {
      color: rgba(255,255,255,0.7);
      margin: 0 auto 48px;
    }

    /* ---- CONTACT FORM ---- */
    .contact-form {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow-lg);
      max-width: 640px;
      margin: 0 auto;
    }

    @media (max-width: 480px) {
      .contact-form {
        padding: 32px 24px;
      }
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    @media (min-width: 560px) {
      .form-row.two-col {
        grid-template-columns: 1fr 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 0.2px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      border: 1.5px solid #E0DDD8;
      border-radius: var(--radius-sm);
      padding: 13px 16px;
      font-size: 15px;
      font-family: var(--font-sans);
      color: var(--dark);
      background: var(--light);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      -webkit-appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 146, 42, 0.15);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
