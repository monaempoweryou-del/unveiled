<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>UNVEILED — Command Center</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --violet: #6C3CE0; --violet-light: #8B5CF6; --violet-dim: rgba(108,60,224,0.12);
    --dark: #0C0C0E; --dark-2: #111115; --dark-3: #1A1A22; --dark-4: #22222C;
    --border: rgba(255,255,255,0.07);
    --green: #10B981; --yellow: #F59E0B; --red: #EF4444; --blue: #3B82F6; --orange: #F97316;
    --text: rgba(255,255,255,0.9); --text-dim: rgba(255,255,255,0.4); --text-mid: rgba(255,255,255,0.65);
  }
  body { background: var(--dark); color: var(--text); font-family: 'Inter',-apple-system,sans-serif; min-height: 100vh; }

  /* LOGIN GATE */
  #login-gate {
    position: fixed; inset: 0; background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
  }
  .login-box {
    background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px; width: 340px;
    text-align: center;
  }
  .login-logo { font-size: 13px; font-weight: 700; letter-spacing: .14em; color: var(--violet-light); text-transform: uppercase; margin-bottom: 6px; }
  .login-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 28px; }
  .login-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); text-align: left; margin-bottom: 8px; }
  .login-input {
    width: 100%; background: var(--dark-4); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; font-size: 14px; color: var(--text);
    outline: none; margin-bottom: 16px; transition: border-color .15s;
    font-family: inherit; letter-spacing: .05em;
  }
  .login-input:focus { border-color: var(--violet-light); }
  .login-input.error { border-color: var(--red); }
  .login-btn {
    width: 100%; background: var(--violet); color: #fff;
    border: none; border-radius: 8px; padding: 12px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity .15s; font-family: inherit;
  }
  .login-btn:hover { opacity: .85; }
  .login-error { font-size: 12px; color: var(--red); margin-top: 12px; display: none; }

  /* TOPBAR */
  .topbar {
    background: var(--dark-2); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: .14em; color: var(--violet-light); text-transform: uppercase; }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-dim); }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; flex-shrink: 0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .refresh-btn {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer;
    transition: all .15s;
  }
  .refresh-btn:hover { border-color: var(--violet-light); color: var(--violet-light); }

  /* PAGE */
  .page { max-width: 1300px; margin: 0 auto; padding: 28px 16px 80px; }

  /* PIPELINE STRIP */
  .pipeline { display: grid; grid-template-columns: repeat(8,1fr); gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 36px; }
  .pipe-stage { background: var(--dark-3); padding: 14px 10px; text-align: center; }
  .pipe-stage.has { background: var(--violet-dim); }
  .pipe-count { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .pipe-count.zero { color: var(--text-dim); }
  .pipe-count.active { color: var(--violet-light); }
  .pipe-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-dim); line-height: 1.3; }

  /* SECTION */
  .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .section-head h2 { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); }
  .count-badge { font-size: 11px; background: var(--dark-4); color: var(--text-dim); padding: 2px 8px; border-radius: 20px; }

  /* CARDS */
  .cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
  .card-wrap { display: flex; gap: 0; align-items: stretch; }
  .card {
    background: var(--dark-3); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px;
    display: grid; grid-template-columns: 2.5fr 1.8fr 1.8fr auto;
    gap: 16px; align-items: center;
    transition: border-color .15s;
    border-left: 3px solid transparent;
    flex: 1; min-width: 0;
  }
  .card-wrap .card { border-radius: 12px 0 0 12px; border-right: none; }
  .card:hover { border-color: rgba(139,92,246,.25); }
  .card.green  { border-left-color: var(--green); }
  .card.yellow { border-left-color: var(--yellow); }
  .card.red    { border-left-color: var(--red); }
  .card.blue   { border-left-color: var(--blue); }
  .card.orange { border-left-color: var(--orange); }
  .card.violet { border-left-color: var(--violet-light); }

  /* NOTE PANEL */
  .note-panel {
    width: 220px; flex-shrink: 0;
    background: var(--dark-4); border: 1px solid var(--border); border-left: none;
    border-radius: 0 12px 12px 0;
    display: flex; flex-direction: column; padding: 12px;
    gap: 8px;
  }
  .note-panel-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); }
  .note-textarea {
    flex: 1; min-height: 72px; resize: none;
    background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 10px;
    font-size: 12px; color: var(--text); font-family: inherit; line-height: 1.4;
    outline: none; transition: border-color .15s;
  }
  .note-textarea:focus { border-color: var(--violet-light); }
  .note-textarea::placeholder { color: var(--text-dim); }
  .note-save-btn {
    background: var(--violet); color: #fff; border: none;
    border-radius: 7px; padding: 6px 10px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: opacity .15s; text-align: center;
  }
  .note-save-btn:hover { opacity: .8; }
  .note-save-btn.saved { background: var(--green); }
  .note-save-btn.saving { opacity: .5; pointer-events: none; }

  /* NUMBER BADGE */
  .client-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--dark-4); border: 1px solid var(--border);
    font-size: 10px; font-weight: 700; color: var(--text-dim);
    margin-right: 7px; flex-shrink: 0; vertical-align: middle;
  }

  .card-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; }
  .card-sub  { font-size: 12px; color: var(--text-dim); display:flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
  .card-sub a { color: var(--violet-light); text-decoration: none; font-size:11px; }

  .phases { display: flex; gap: 3px; margin-top: 4px; }
  .ph { width: 8px; height: 8px; border-radius: 50%; background: var(--dark-4); border: 1px solid rgba(255,255,255,.1); }
  .ph.done { background: var(--violet-light); border-color: var(--violet-light); }
  .ph.current { background: var(--yellow); border-color: var(--yellow); animation: blink 1.5s infinite; }
  .ph.stuck { background: var(--red); border-color: var(--red); }

  .contact-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .contact-meta { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 2px; }
  .contact-meta a { color: var(--text-dim); text-decoration: none; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 20px; margin-bottom: 5px;
    white-space: nowrap;
  }
  .status-badge::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }
  .sb-preview  { background: rgba(16,185,129,.12); color: var(--green); }
  .sb-qa       { background: rgba(59,130,246,.12);  color: var(--blue); }
  .sb-build    { background: rgba(139,92,246,.12);  color: var(--violet-light); }
  .sb-stuck-b  { background: rgba(239,68,68,.12);   color: var(--red); }
  .sb-stuck-a  { background: rgba(245,158,11,.12);  color: var(--yellow); }
  .sb-new      { background: rgba(249,115,22,.12);  color: var(--orange); }
  .sb-approved { background: rgba(16,185,129,.15);  color: var(--green); }
  .sb-active   { background: rgba(16,185,129,.2);   color: var(--green); }

  .next-action { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

  .card-btns { display: flex; flex-direction: column; gap: 7px; align-items: flex-end; min-width: 110px; }
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 6px 13px;
    border-radius: 7px; border: none; cursor: pointer; text-decoration: none;
    white-space: nowrap; transition: opacity .15s;
  }
  .btn:hover { opacity: .8; }
  .btn-primary { background: var(--violet); color: #fff; }
  .btn-ghost   { background: var(--dark-4); color: var(--text-mid); }

  /* LEADS TABLE */
  .leads-wrap { background: var(--dark-3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--dark-4); padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.015); }
  .score { display: flex; align-items: center; gap: 7px; }
  .score-n { font-weight: 700; width: 18px; }
  .score-n.h8 { color: var(--green); }
  .score-n.h7 { color: var(--yellow); }
  .score-track { width: 50px; height: 3px; background: var(--dark-4); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; }
  .sf-8 { background: var(--green); }
  .sf-7 { background: var(--yellow); }
  .tag { font-size: 11px; background: var(--dark-4); color: var(--text-dim); padding: 2px 8px; border-radius: 20px; }
  .reach-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--violet-light); background: var(--violet-dim); padding: 3px 9px; border-radius: 20px; }
  .lead-links { display: flex; flex-wrap: wrap; gap: 4px; }
  .lead-link { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-decoration: none; white-space: nowrap; transition: opacity .15s; }
  .lead-link:hover { opacity: .75; }
  .lead-link.google   { background: rgba(59,130,246,.15);  color: #60a5fa; }
  .lead-link.website  { background: rgba(139,92,246,.15);  color: var(--violet-light); }
  .lead-link.facebook { background: rgba(59,100,246,.15);  color: #818cf8; }
  .lead-link.instagram{ background: rgba(249,115,22,.15);  color: #fb923c; }
  .lead-link.yelp     { background: rgba(239,68,68,.15);   color: #f87171; }
  .lead-link.source        { background: rgba(16,185,129,.15);  color: var(--green); }
  .lead-link.preview-link  { background: rgba(16,185,129,.2);   color: #34d399; font-weight: 700; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 36px 0; }

  /* NOTES */
  .note-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .note-card { background: var(--dark-3); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .note-title { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .note-item { font-size: 12px; color: var(--text-mid); margin-bottom: 7px; padding-left: 14px; position: relative; line-height: 1.4; }
  .note-item::before { content: '→'; color: var(--violet-light); position: absolute; left: 0; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--text-dim); font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--violet-light); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MOBILE */
  @media (max-width: 768px) {
    .card { grid-template-columns: 1fr; gap: 10px; border-radius: 12px 12px 0 0 !important; border-right: 1px solid var(--border) !important; }
    .card-wrap { flex-direction: column; }
    .note-panel { width: 100%; border-left: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; }
    .card-btns { flex-direction: row; align-items: flex-start; flex-wrap: wrap; }
    .pipeline { grid-template-columns: repeat(4,1fr); }
    .note-grid { grid-template-columns: 1fr; }
    .pipe-count { font-size: 22px; }
    #last-updated { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login-gate">
  <div class="login-box">
    <div class="login-logo">UNVEILED</div>
    <div class="login-sub">Command Center</div>
    <label class="login-label">Password</label>
    <input type="password" id="pw-input" class="login-input" placeholder="Enter password" autocomplete="current-password">
    <button class="login-btn" onclick="checkPassword()">Enter</button>
    <div class="login-error" id="pw-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD (hidden until authenticated) -->
<div id="dashboard" style="display:none">

<div class="topbar">
  <div class="logo">UNVEILED <span>/ Command Center</span></div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <span id="last-updated">Loading...</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="page">
  <div class="pipeline" id="pipeline">
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-new">—</div><div class="pipe-label">New<br>Lead</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-research">—</div><div class="pipe-label">Research-<br>ing</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-build">—</div><div class="pipe-label">In<br>Build</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-qa">—</div><div class="pipe-label">In<br>QA</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-preview">—</div><div class="pipe-label">Preview<br>Delivered</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-approved">—</div><div class="pipe-label">Approved</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-active">—</div><div class="pipe-label">Active<br>Customer</div></div>
    <div class="pipe-stage"><div class="pipe-count zero" id="cnt-stuck">—</div><div class="pipe-label">Stuck /<br>Blocked</div></div>
  </div>
  <div id="main-content">
    <div class="loading"><div class="spinner"></div>Loading live data…</div>
  </div>
</div>

</div><!-- /dashboard -->

<script>
const PASS = 'Mona2026';
const SESSION_KEY = 'uv_cc_auth';

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASS) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-gate').style.display = 'none';
    document.getElementById('dashboard').style.display = '';
    loadData();
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    document.getElementById('pw-error').style.display = 'block';
    setTimeout(() => inp.classList.remove('error'), 1000);
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// Auto-login if already authenticated this session
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('login-gate').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────

const SUPABASE_URL = 'https://eosvftmiwndmctrqprtz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BYxqF1ViwTrfaI4RGhciVw_kgbt-pSA';

const STATUS_CONFIG = {
  'PREVIEW DELIVERED': { label: 'Preview Delivered', cls: 'sb-preview', border: 'green',
    next: 'Awaiting client approval. Follow up if no response in 48h.', phases: [1,1,1,1,1,1,0] },
  'APPROVED':          { label: 'Approved',          cls: 'sb-approved', border: 'green',
    next: 'Client approved. Set up Square payment and go live!', phases: [1,1,1,1,1,1,1] },
  'ACTIVE CUSTOMER':   { label: 'Active Customer',   cls: 'sb-active',   border: 'green',
    next: 'Active subscriber. Ensure monthly care deliverables.', phases: [1,1,1,1,1,1,1] },
  'QA':                { label: 'In QA',             cls: 'sb-qa',       border: 'blue',
    next: 'Review site, fix issues, then deliver preview.', phases: [1,1,1,1,0,0,0] },
  'BUILDING':          { label: 'Building',          cls: 'sb-build',    border: 'violet',
    next: 'Site in active build phase.', phases: [1,1,1,0,0,0,0] },
  'RESEARCHING':       { label: 'Researching',       cls: 'sb-build',    border: 'violet',
    next: 'Research phase active.', phases: [1,0,0,0,0,0,0] },
  'STUCK - BUILD':     { label: 'Stuck: Build',      cls: 'sb-stuck-b',  border: 'red',
    next: 'Build phase failed. Needs a rebuild session.', phases: [1,1,1,-1,0,0,0] },
  'STUCK - ASSETS':    { label: 'Stuck: Assets',     cls: 'sb-stuck-a',  border: 'yellow',
    next: 'Stuck at assets. Gather photos and logo to unblock.', phases: [1,1,-1,0,0,0,0] },
  'NEW LEAD':          { label: 'New Lead',          cls: 'sb-new',      border: 'orange',
    next: 'Cold outreach needed. Call or text to introduce UNVEILED.', phases: [0,0,0,0,0,0,0] },
};

const PHASE_LABELS = ['Research','Strategy','Assets','Build','QA','Delivery','Done'];

function phaseHtml(dots) {
  return dots.map((v,i) => {
    const cls = v === 1 ? 'done' : v === -1 ? 'stuck' : '';
    return `<div class="ph ${cls}" title="${PHASE_LABELS[i]}"></div>`;
  }).join('');
}

function statusBadge(status) {
  const cfg = STATUS_CONFIG[status] || { label: status, cls: 'sb-new' };
  return `<div class="status-badge ${cfg.cls}">${cfg.label}</div>`;
}

function cardLinks(row) {
  const sp = row.social_profiles || {};
  const links = [];
  // Unveiled-built preview (highest priority)
  const builtUrl = sp.unveiled_preview || (row.website && row.website.includes('unveiled.pro') ? row.website : null);
  if (builtUrl)
    links.push(`<a class="lead-link preview-link" href="${builtUrl}" target="_blank">Our Build</a>`);
  // Their existing website
  const existingSite = row.website && !row.website.includes('unveiled.pro') ? row.website : null;
  if (existingSite)
    links.push(`<a class="lead-link website" href="${existingSite}" target="_blank">Their Site</a>`);
  // Social / directory links
  if (sp.google)    links.push(`<a class="lead-link google"    href="${sp.google}"    target="_blank">Google</a>`);
  if (sp.facebook)  links.push(`<a class="lead-link facebook"  href="${sp.facebook}"  target="_blank">Facebook</a>`);
  if (sp.instagram) links.push(`<a class="lead-link instagram" href="${sp.instagram}" target="_blank">Instagram</a>`);
  if (sp.yelp)      links.push(`<a class="lead-link yelp"      href="${sp.yelp}"      target="_blank">Yelp</a>`);
  return links.length ? `<div class="lead-links" style="margin-top:6px">${links.join('')}</div>` : '';
}

function cardBtns(row) {
  const btns = [];
  if (row.email) {
    const sub = encodeURIComponent('Following up on your ' + row.business_name + ' website');
    btns.push(`<a class="btn btn-primary" href="mailto:${row.email}?subject=${sub}">Email</a>`);
  }
  if (row.phone)
    btns.push(`<a class="btn btn-ghost" href="tel:${row.phone}">Call</a>`);
  return btns.join('');
}

function productionCard(row, num, showNotes) {
  const cfg = STATUS_CONFIG[row.status] || STATUS_CONFIG['NEW LEAD'];
  const numBadge = `<span class="client-num">${num}</span>`;
  const card = `
  <div class="card ${cfg.border}" id="card-${row.id}">
    <div>
      <div class="card-name">${numBadge}${row.business_name || '—'}</div>
      ${cardLinks(row)}
      <div class="phases" style="margin-top:8px">${phaseHtml(cfg.phases)}</div>
    </div>
    <div>
      <div class="contact-name">${row.contact_name || '—'}</div>
      <div class="contact-meta">
        ${row.email ? `<a href="mailto:${row.email}">${row.email}</a>` : ''}
        ${row.phone ? `<span>${row.phone}</span>` : ''}
      </div>
    </div>
    <div>
      ${statusBadge(row.status)}
      <div class="next-action">${cfg.next}</div>
    </div>
    <div class="card-btns">${cardBtns(row)}</div>
  </div>`;

  if (!showNotes) return card;

  const existingNote = (row.requirements || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const notePanel = `
  <div class="note-panel">
    <div class="note-panel-label">Message to System</div>
    <textarea class="note-textarea" id="note-${row.id}" placeholder="Add correction, request, or update…">${existingNote}</textarea>
    <button class="note-save-btn" onclick="saveNote('${row.id}')">Save</button>
  </div>`;

  return `<div class="card-wrap">${card}${notePanel}</div>`;
}

async function saveNote(id) {
  const textarea = document.getElementById(`note-${id}`);
  const btn = textarea?.closest('.note-panel')?.querySelector('.note-save-btn');
  if (!textarea || !btn) return;
  btn.textContent = 'Saving…';
  btn.className = 'note-save-btn saving';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json', Prefer: 'return=minimal'
      },
      body: JSON.stringify({ requirements: textarea.value })
    });
    if (res.ok) {
      btn.textContent = 'Saved ✓';
      btn.className = 'note-save-btn saved';
      setTimeout(() => { btn.textContent = 'Save'; btn.className = 'note-save-btn'; }, 2000);
    } else {
      btn.textContent = 'Error — retry';
      btn.className = 'note-save-btn';
    }
  } catch(e) {
    btn.textContent = 'Error — retry';
    btn.className = 'note-save-btn';
  }
}

function leadLinks(row) {
  const sp = row.social_profiles || {};
  const links = [];
  if (sp.google)    links.push(`<a class="lead-link google"   href="${sp.google}"    target="_blank">Maps</a>`);
  if (row.website)  links.push(`<a class="lead-link website"  href="${row.website}"  target="_blank">Site</a>`);
  if (sp.facebook)  links.push(`<a class="lead-link facebook" href="${sp.facebook}"  target="_blank">FB</a>`);
  if (sp.instagram) links.push(`<a class="lead-link instagram"href="${sp.instagram}" target="_blank">IG</a>`);
  if (sp.yelp)      links.push(`<a class="lead-link yelp"     href="${sp.yelp}"      target="_blank">Yelp</a>`);
  if (row.source && !links.find(l => l.includes(row.source)))
    links.push(`<a class="lead-link source" href="${row.source}" target="_blank">Source</a>`);
  return links.length ? `<div class="lead-links">${links.join('')}</div>` : '<span style="color:var(--text-dim);font-size:11px">—</span>';
}

function leadRow(row, num) {
  const score = row.opportunity_score || 0;
  const sfCls = score >= 8 ? 'sf-8' : 'sf-7';
  const snCls = score >= 8 ? 'h8' : 'h7';
  const pct = (score / 10 * 100) + '%';
  const phoneHtml = row.phone
    ? `<a href="tel:${row.phone}" style="color:var(--text-mid);text-decoration:none">${row.phone}</a>`
    : '—';
  return `
  <tr>
    <td>
      <span class="client-num">${num}</span>
      <strong>${row.business_name || '—'}</strong>
      ${row.contact_name ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;padding-left:27px">${row.contact_name}</div>` : ''}
    </td>
    <td style="color:var(--text-dim);font-size:12px">${row.about || row.additional_notes || ''}</td>
    <td>${phoneHtml}</td>
    <td>${leadLinks(row)}</td>
    <td>
      <div class="score">
        <span class="score-n ${snCls}">${score}</span>
        <div class="score-track"><div class="score-fill ${sfCls}" style="width:${pct}"></div></div>
      </div>
    </td>
    <td><span class="reach-tag">Reach Out</span></td>
  </tr>`;
}

async function loadData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/leads?select=*&order=created_at.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();
    if (!Array.isArray(rows)) throw new Error(rows.message || 'Unexpected response');

    const productions = rows.filter(r => r.discovery_method === 'unveiled-form' || (!r.discovery_method && r.status !== 'NEW LEAD'));
    const ocLeads     = rows.filter(r => r.discovery_method === 'google-maps');

    const counts = { new:0, research:0, build:0, qa:0, preview:0, approved:0, active:0, stuck:0 };
    rows.forEach(r => {
      if (r.status === 'NEW LEAD')                    counts.new++;
      else if (r.status === 'RESEARCHING')            counts.research++;
      else if (r.status === 'BUILDING')               counts.build++;
      else if (r.status === 'QA')                     counts.qa++;
      else if (r.status === 'PREVIEW DELIVERED')      counts.preview++;
      else if (r.status === 'APPROVED')               counts.approved++;
      else if (r.status === 'ACTIVE CUSTOMER')        counts.active++;
      else if (r.status && r.status.startsWith('STUCK')) counts.stuck++;
    });

    ['new','research','build','qa','preview','approved','active','stuck'].forEach(k => {
      const el = document.getElementById(`cnt-${k}`);
      const n = counts[k];
      el.textContent = n;
      el.className = `pipe-count ${n > 0 ? 'active' : 'zero'}`;
      el.parentElement.className = `pipe-stage ${n > 0 ? 'has' : ''}`;
    });

    const ORDER = ['STUCK - BUILD','STUCK - ASSETS','PREVIEW DELIVERED','QA','BUILDING','RESEARCHING','APPROVED','ACTIVE CUSTOMER'];
    productions.sort((a,b) => ORDER.indexOf(a.status) - ORDER.indexOf(b.status));

    const needsAttention = productions.filter(r => ['STUCK - BUILD','STUCK - ASSETS','PREVIEW DELIVERED'].includes(r.status));
    const inProgress     = productions.filter(r => ['QA','BUILDING','RESEARCHING'].includes(r.status));
    const converted      = productions.filter(r => ['APPROVED','ACTIVE CUSTOMER'].includes(r.status));

    let html = '';
    let clientNum = 1;

    if (needsAttention.length)
      html += `<div class="section-head"><h2>Needs Attention</h2><span class="count-badge">${needsAttention.length}</span></div>
               <div class="cards">${needsAttention.map(r => productionCard(r, clientNum++, true)).join('')}</div>`;

    if (inProgress.length)
      html += `<div class="section-head"><h2>In Progress</h2><span class="count-badge">${inProgress.length}</span></div>
               <div class="cards">${inProgress.map(r => productionCard(r, clientNum++, true)).join('')}</div>`;

    if (converted.length)
      html += `<div class="section-head"><h2>Converted</h2><span class="count-badge">${converted.length}</span></div>
               <div class="cards">${converted.map(r => productionCard(r, clientNum++, false)).join('')}</div>`;

    if (ocLeads.length)
      html += `<div class="divider"></div>
               <div class="section-head"><h2>OC Lead Hunt — Round 1</h2><span class="count-badge">${ocLeads.length} businesses</span></div>
               <div class="leads-wrap"><table>
                 <thead><tr><th>Business</th><th>About</th><th>Phone</th><th>Links</th><th>Score</th><th>Action</th></tr></thead>
                 <tbody>${ocLeads.map((r,i) => leadRow(r, clientNum + i)).join('')}</tbody>
               </table></div>`;

    html += `<div class="note-grid">
      <div class="note-card">
        <div class="note-title">Right Now</div>
        ${needsAttention.map(r => `<div class="note-item"><strong>${r.business_name}</strong>: ${STATUS_CONFIG[r.status]?.next || ''}</div>`).join('')}
      </div>
      <div class="note-card">
        <div class="note-title">System Blockers</div>
        <div class="note-item">SMS blocked: Twilio toll-free verification needed (no EIN required)</div>
        <div class="note-item">Square payment not connected: needed before first paying customer</div>
      </div>
      <div class="note-card">
        <div class="note-title">Database</div>
        <div class="note-item">${rows.length} total records in Supabase</div>
        <div class="note-item">${ocLeads.length} OC leads ready for outreach</div>
        <div class="note-item">${productions.length} production clients tracked</div>
      </div>
    </div>`;

    document.getElementById('main-content').innerHTML = html;
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch (err) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading" style="color:var(--red)">Error: ${err.message}<br><br>
       <button class="refresh-btn" onclick="loadData()" style="margin:0 auto;display:block">Try Again</button></div>`;
  }
}

if (sessionStorage.getItem(SESSION_KEY) === '1') loadData();
setInterval(() => { if (sessionStorage.getItem(SESSION_KEY) === '1') loadData(); }, 60000);
</script>
</body>
</html>
