<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#0A0912" />
<title>UNVEILED</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0912; --bg2:#0F0D18; --card:#15121f; --soft:#1b1729; --ink:#F6F4FB; --mut:#9b93b3; --faint:#6a6480;
    --line:rgba(255,255,255,.06); --violet:#9b7bff; --grad:linear-gradient(120deg,#8B5CF6,#A855F7);
    --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    --r:20px; --sp:clamp(16px,4vw,28px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:radial-gradient(120% 60% at 50% -10%, #161227 0%, var(--bg) 60%);color:var(--ink);
    font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
  .display{font-family:'Space Grotesk',Inter,sans-serif}
  a{color:var(--violet);text-decoration:none}
  .wrap{max-width:720px;margin:0 auto;padding:0 var(--sp) 64px}
  .top{display:flex;align-items:center;gap:10px;padding:20px var(--sp);max-width:720px;margin:0 auto}
  .brand{font-family:'Space Grotesk';font-weight:700;letter-spacing:.14em;font-size:13px;color:var(--mut)}
  .brand b{color:var(--ink)} .grow{flex:1}
  .ghost{background:none;border:0;color:var(--faint);font:inherit;font-size:13px;cursor:pointer;padding:8px;border-radius:10px}
  .ghost:hover{color:var(--ink)}
  /* hero verdict */
  .hero{padding:14px 0 8px}
  .greet{color:var(--mut);font-size:15px;margin-bottom:10px}
  .verdict{font-family:'Space Grotesk';font-weight:600;font-size:clamp(28px,7vw,40px);line-height:1.12;letter-spacing:-.02em;margin:0}
  .verdict .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--mut);font-size:15px;margin-top:12px}
  /* ribbon */
  .ribbon{display:flex;gap:10px;margin:22px 0 6px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .stat .n{font-family:'Space Grotesk';font-weight:700;font-size:24px}
  .stat .l{color:var(--faint);font-size:12px;margin-top:2px}
  /* section label */
  .lab{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:30px 0 12px;font-weight:600}
  /* decision card */
  .dcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;
    box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .dcard .nm{font-family:'Space Grotesk';font-weight:600;font-size:19px}
  .dcard .meta{color:var(--mut);font-size:14px;margin-top:4px}
  .dcard .why{color:var(--ink);font-size:15px;margin:12px 0 4px}
  .thumb{display:block;width:100%;height:150px;border-radius:14px;border:1px solid var(--line);object-fit:cover;background:var(--soft);margin:12px 0 4px}
  .acts{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;border:0;border-radius:14px;padding:14px;font:inherit;font-weight:600;font-size:15px;cursor:pointer}
  .primary{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(139,92,246,.35)}
  .second{flex:0 0 auto;background:var(--soft);color:var(--mut);border:1px solid var(--line);padding:14px 16px}
  /* calm rows */
  .row{display:flex;align-items:center;gap:14px;padding:15px 16px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px}
  .row .ic{width:9px;height:9px;border-radius:50%;background:var(--mut);flex:0 0 auto}
  .row .ic.g{background:var(--ok)} .row .ic.y{background:var(--warn)} .row .ic.r{background:var(--bad)}
  .row .t{flex:1;font-size:15px} .row .v{color:var(--mut);font-size:14px}
  .allclear{text-align:center;padding:34px 18px;color:var(--mut)}
  .allclear .big{font-family:'Space Grotesk';font-size:40px;margin-bottom:6px}
  .deps{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
  .dep{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .dep .h{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
  .dep .d{font-size:12px;color:var(--mut);margin-top:3px}
  .idot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex:0 0 auto}
  .idot.idle{background:var(--faint)} .idot.warn{background:var(--warn)} .idot.bad{background:var(--bad)}
  .opp{background:linear-gradient(120deg,rgba(139,92,246,.12),rgba(168,85,247,.06));border:1px solid #4a3a7a;border-radius:var(--r);padding:16px;margin-bottom:12px}
  /* progressive disclosure */
  details.more{margin-top:30px;border-top:1px solid var(--line);padding-top:16px}
  details.more>summary{list-style:none;cursor:pointer;color:var(--faint);font-size:14px;display:flex;align-items:center;gap:8px}
  details.more>summary::-webkit-details-marker{display:none}
  details.more[open]>summary{color:var(--mut)}
  .qh{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:20px 0 8px}
  .mini{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:14px}
  .mini .s{color:var(--faint);font-size:12px}
  .foot{color:var(--faint);font-size:12px;text-align:center;margin-top:30px}
  /* signin */
  .signin{max-width:380px;margin:18vh auto 0;text-align:center;padding:0 var(--sp)}
  .signin .v{font-family:'Space Grotesk';font-weight:600;font-size:24px;margin-bottom:6px}
  .signin input{width:100%;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:14px;padding:14px;font:inherit;font-size:16px;margin-top:16px}
  .signin .btn{width:100%;margin-top:12px}
  .note{font-size:13px;color:var(--faint);margin-top:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);display:inline-block;margin-right:6px}
  .dot.ok{background:var(--ok)} .dot.bad{background:var(--bad)}
</style>
</head>
<body>
<div class="top">
  <span class="brand">UNVEILED <b>·</b> COMMAND</span><span class="grow"></span>
  <span id="conn" style="font-size:12px;color:var(--faint)"><span class="dot" id="dot"></span><span id="connTxt"></span></span>
  <button class="ghost" id="signout" style="display:none" onclick="signOut()">Sign out</button>
</div>

<div id="signin" class="signin" style="display:none">
  <div class="v display">Command Center</div>
  <div style="color:var(--mut);font-size:15px">Sign in to see your company.</div>
  <input id="email" type="email" placeholder="you@monadigitalmarketing.com" autocomplete="email"/>
  <input id="password" type="password" placeholder="Password" autocomplete="current-password"/>
  <button class="btn primary" onclick="signInPassword()">Sign in</button>
  <div class="note"><a href="#" style="color:var(--violet)" onclick="sendLink();return false;">Email me a sign-in link instead</a></div>
  <div class="note" id="signinNote"></div>
</div>

<div id="board" class="wrap" style="display:none">
  <div class="hero">
    <div class="greet" id="greet"></div>
    <h1 class="verdict" id="verdict">…</h1>
    <div class="sub" id="sub"></div>
  </div>
  <div class="ribbon" id="ribbon"></div>
  <div id="decisions"></div>
  <div id="overnight"></div>
  <div id="departments"></div>
  <div id="automations"></div>
  <div id="attention"></div>
  <details class="more" id="moreWrap"><summary>View full operations ▾</summary><div id="full"></div></details>
  <div class="foot" id="foot"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CFG={url:'https://eosvftmiwndmctrqprtz.supabase.co',key:'sb_publishable_BYxqF1ViwTrfaI4RGhciVw_kgbt-pSA'};
const sb=window.supabase.createClient(CFG.url,CFG.key);
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const OUT=['outbound','prospect','prospecting','growth','cold'];
const isInbound=l=>!OUT.includes((l.source||'').toLowerCase());
const setConn=(s,t)=>{$('#dot').className='dot '+(s||'');$('#connTxt').textContent=t;};
const bucket=s=>{s=(s||'').toUpperCase();
  if(['NEW LEAD','ENRICHING','QUALIFYING','VALIDATING'].includes(s))return'intake';
  if(s==='QUALIFIED')return'qualified';
  if(['RESEARCHING','BUILDING'].includes(s))return'production';
  if(s==='QA')return'qa';
  if(['DEPLOYED','PREVIEW READY','APPROVAL-READY'].includes(s))return'approval';
  if(['PREVIEW DELIVERED','REVEAL-SENT'].includes(s))return'reveal';
  if(['FOLLOW-UP','REPLIED'].includes(s))return'followup';
  if(s.startsWith('STUCK')||s==='BLOCKED'||s==='FAILED-QUAL')return'blocked';
  if(['APPROVED','ACTIVE CUSTOMER','WON','PAYMENT','ONBOARDING'].includes(s))return'won';
  if(s==='LOST')return'lost';return'other';};

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){$('#signin').style.display='none';$('#board').style.display='block';$('#signout').style.display='inline-block';load();}
  else{$('#signin').style.display='block';$('#board').style.display='none';setConn('','');}
}
async function sendLink(){const e=$('#email').value.trim();if(!e)return;$('#signinNote').textContent='Sending…';
  const {error}=await sb.auth.signInWithOtp({email:e,options:{emailRedirectTo:location.href}});
  $('#signinNote').textContent=error?('Error: '+error.message):'Check your email, tap the link, and you are in.';}
async function signInPassword(){
  const email=$('#email').value.trim(), password=$('#password').value;
  if(!email||!password){ $('#signinNote').textContent='Enter your email and password.'; return; }
  $('#signinNote').textContent='Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $('#signinNote').textContent='Error: '+error.message; }
}
async function signOut(){await sb.auth.signOut();location.reload();}

async function load(){
  setConn('','syncing…');
  let leads=[],tasks=[],acts=[];
  try{
    const r=await sb.from('leads').select('*').order('created_at',{ascending:false}).limit(200);
    if(r.error)throw r.error; leads=r.data||[];
    const t=await sb.from('tasks').select('id,status,prompt,created_at').order('created_at',{ascending:false}).limit(60); tasks=t.error?[]:t.data;
    const a=await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(20); acts=a.error?[]:a.data;
    setConn('ok','live');
  }catch(e){ setConn('bad','sign in again'); }
  render(leads,tasks,acts);
}
function emailTasks(t){return t.map(x=>{let p={};try{p=JSON.parse(x.prompt)}catch(_){}return{...x,p}}).filter(x=>x.p&&x.p.type==='email');}

function render(leads,tasks,acts){
  const B={intake:[],qualified:[],production:[],qa:[],approval:[],reveal:[],followup:[],blocked:[],won:[],lost:[],other:[]};
  leads.forEach(l=>B[bucket(l.status)].push(l));
  const et=emailTasks(tasks),sent=et.filter(x=>x.status==='completed'),pend=et.filter(x=>x.status!=='completed');
  const inbound=leads.filter(isInbound), decisions=B.approval, blockers=B.blocked;
  const inFlight=B.reveal.length+B.followup.length+pend.length;
  const needs=decisions.length+blockers.length;

  const h=new Date().getHours();
  $('#greet').textContent=(h<5?'Late night':h<12?'Good morning':h<18?'Good afternoon':'Good evening')+', Moe.';

  if(decisions.length){ $('#verdict').innerHTML=`<span class="hl">${decisions.length} ${decisions.length>1?'decisions':'decision'}</span> ${decisions.length>1?'need':'needs'} you.`;
    $('#sub').textContent='Everything else is running on its own.'; }
  else if(blockers.length){ $('#verdict').innerHTML=`${blockers.length} ${blockers.length>1?'things':'thing'} need a look.`;
    $('#sub').textContent='No approvals waiting — just a couple of blockers.'; }
  else { $('#verdict').innerHTML=`The company is <span class="hl">running.</span>`;
    $('#sub').textContent='Nothing needs you right now. '+(sent.length?`${sent.length} reveal${sent.length>1?'s':''} in flight.`:'Pipeline is warming up.'); }

  $('#ribbon').innerHTML=[
    ['Pipeline', inbound.length+B.production.length+B.qa.length+B.qualified.length],
    ['In flight', inFlight],
    ['Needs you', needs]
  ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

  // DECISIONS — the focal point
  if(decisions.length){
    $('#decisions').innerHTML=`<div class="lab">Needs your decision</div>`+decisions.map(l=>{
      const url=l.preview_url||l.website||'';
      return `<div class="dcard">
        <div class="nm">${esc(l.business_name||l.name||'Preview')}</div>
        <div class="meta">${isInbound(l)?'Inbound · ':'Outbound · '}${esc(l.industry||'')} ${url?`· <a href="${esc(url)}" target="_blank">Open preview ↗</a>`:''}</div>
        <div class="why">Preview is built and passed every quality gate. Approve to send the reveal.</div>
        <div class="acts">
          <button class="btn primary" onclick="act('${l.id}','APPROVED')">Approve & reveal</button>
          <button class="btn second" onclick="act('${l.id}','CHANGES')">Changes</button>
          <button class="btn second" onclick="act('${l.id}','LOST')">Pass</button>
        </div></div>`;
    }).join('');
  } else {
    $('#decisions').innerHTML=`<div class="allclear"><div class="big">✓</div>No approvals waiting. You're clear.</div>`;
  }

  // WARM OPPORTUNITIES — qualified leads worth a personal touch (executive move)
  const warm=B.qualified.filter(l=>(l.additional_notes||'').toLowerCase().includes('warm')||l.phone);
  if(warm.length){
    $('#decisions').innerHTML += `<div class="lab">Opportunities for you</div>`+warm.map(l=>`<div class="opp">
      <div style="font-family:'Space Grotesk';font-weight:600;font-size:17px">${esc(l.business_name||'')}</div>
      <div style="color:var(--mut);font-size:13px;margin-top:3px">${esc((l.additional_notes||'').slice(0,130))}</div>
      <div class="acts" style="margin-top:12px">
        ${l.phone?`<a class="btn primary" href="tel:${esc(l.phone)}">Call ${esc(l.phone)}</a>`:''}
        ${l.preview_url?`<a class="btn second" href="${esc(l.preview_url)}" target="_blank">Preview</a>`:''}
        <button class="btn second" onclick="logContact('${l.id}')">Log: I reached out</button>
      </div></div>`).join('');
  }

  // OVERNIGHT — what happened since you left
  const recentActs=acts.filter(a=>Date.now()-new Date(a.created_at).getTime()<14*3600*1000);
  if(recentActs.length||sent.length){
    $('#overnight').innerHTML=`<div class="lab">Overnight</div>`+
      recentActs.slice(0,5).map(a=>`<div class="row"><span class="ic g"></span><span class="t">${esc(a.action||'event')}</span><span class="v">${esc(a.actor||'')}</span></div>`).join('')+
      `<div class="row"><span class="ic g"></span><span class="t">${sent.length} email${sent.length!==1?'s':''} delivered by the worker</span></div>`;
  } else { $('#overnight').innerHTML=''; }

  // DEPARTMENTS — what each is doing
  const fu=acts.find(a=>a.actor==='run_followups');
  const deps=[
    ['Growth', recentActs.some(a=>['enriched','disqualified'].includes(a.action))?'g':'idle', recentActs.filter(a=>['enriched','disqualified'].includes(a.action)).length+' enriched · needs data source'],
    ['Production', (B.production.length+B.qa.length)?'g':'idle', (B.production.length+B.qa.length)+' in build/QA'],
    ['QA', 'g', 'gates enforced'],
    ['Outreach', sent.length?'g':'idle', sent.length+' sent'],
    ['Follow-up', fu?'g':'warn', fu?'sweeper live':'scheduled'],
    ['Learning', recentActs.length?'g':'idle', recentActs.length+' events']
  ];
  $('#departments').innerHTML=`<div class="lab">Departments</div><div class="deps">`+deps.map(([n,s,d])=>`<div class="dep"><div class="h"><span class="idot ${s==='g'?'':s}"></span>${n}</div><div class="d">${esc(d)}</div></div>`).join('')+`</div>`;

  // AUTOMATIONS — health
  const autos=[
    ['Approve → reveal','g','live · verified'],
    ['Preview-ready → approval email','g','live · verified'],
    ['Follow-up sweeper','g',fu?'ran '+timeAgo(fu.created_at):'live (30-min cron)'],
    ['Growth queue engine','y','scheduled · needs one-time approval'],
    ['Morning brief','y','6:34am · needs approval']
  ];
  $('#automations').innerHTML=`<div class="lab">Automations</div>`+autos.map(([n,s,d])=>`<div class="row"><span class="ic ${s}"></span><span class="t">${n}</span><span class="v">${esc(d)}</span></div>`).join('');

  // ATTENTION — calm one-liners
  const rows=[];
  if(blockers.length) rows.push(['r',`${blockers.length} blocked`, blockers.map(b=>esc(b.business_name)).slice(0,3).join(', ')]);
  if(inbound.length) rows.push(['y',`${inbound.length} inbound lead${inbound.length>1?'s':''} waiting`,'priority #1']);
  if(sent.length) rows.push(['g',`${sent.length} reveal${sent.length>1?'s':''} delivered`,'awaiting reply']);
  if(B.followup.length) rows.push(['g',`${B.followup.length} in follow-up`,'auto-cadence']);
  $('#attention').innerHTML = rows.length? `<div class="lab">Worth knowing</div>`+rows.map(([c,t,v])=>`<div class="row"><span class="ic ${c}"></span><span class="t">${t}</span><span class="v">${esc(v)}</span></div>`).join('') : '';

  // FULL OPS (progressive disclosure)
  const q=(title,arr)=>arr.length?`<div class="qh">${title} · ${arr.length}</div>`+arr.map(l=>`<div class="mini">${esc(l.business_name||l.name||'—')} <span class="s">· ${esc(l.status||'')}${l.email?' · '+esc(l.email):''}</span></div>`).join(''):'';
  let full='';
  full+=q('Inbound', inbound);
  full+=q('Qualified', B.qualified);
  full+=q('In production', [...B.production,...B.qa]);
  full+=q('Reveals / follow-up', [...B.reveal,...B.followup]);
  full+=q('Blocked', blockers);
  full+=q('Outbound candidates', B.intake.filter(l=>!isInbound(l)));
  full+=q('Customers', B.won);
  full+=`<div class="qh">Outbound email · worker</div><div class="mini">Sent ${sent.length} · Pending ${pend.length}<div class="s">${sent.slice(0,4).map(t=>esc(t.p.to)).join(', ')||''}</div></div>`;
  if(acts.length) full+=`<div class="qh">Learning events</div>`+acts.slice(0,6).map(a=>`<div class="mini">${esc(a.action||'event')}<span class="s"> · ${esc((a.created_at||'').slice(0,16).replace('T',' '))}</span></div>`).join('');
  $('#full').innerHTML=full||'<div class="mini">Quiet across the board.</div>';
  $('#moreWrap').style.display = full? 'block':'none';

  $('#foot').textContent='Updated '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+' · tap to refresh';
  $('#foot').onclick=load;
}
async function act(id,decision){
  const map={APPROVED:'APPROVED',CHANGES:'CHANGES REQUESTED',LOST:'LOST'};
  if(!confirm((decision==='APPROVED'?'Approve and send the reveal?':'Set to '+map[decision]+'?')))return;
  try{ const {error}=await sb.from('leads').update({status:map[decision]}).eq('id',id); if(error)throw error;
    try{await sb.from('activity_log').insert({entity_type:'lead',entity_id:id,action:'ceo_decision',actor:'CEO',meta:{decision:map[decision]}});}catch(_){}
    load();
  }catch(e){ alert('Could not update (permission?): '+e.message); }
}
function timeAgo(t){ const m=Math.round((Date.now()-new Date(t).getTime())/60000); return m<1?'just now':m<60?m+'m ago':Math.round(m/60)+'h ago'; }
async function logContact(id){
  try{ await sb.from('activity_log').insert({entity_type:'lead',entity_id:id,action:'ceo_outreach',actor:'CEO',meta:{}}); load(); }
  catch(e){ alert('Could not log: '+e.message); }
}
sb.auth.onAuthStateChange(()=>init()); init();
</script>
</body>
</html>
