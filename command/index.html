<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>UNVEILED — Command Center</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#070509" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="UNVEILED" />
<link rel="manifest" href="/command/manifest.json" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23130a26'/><circle cx='50' cy='50' r='30' fill='%237c3aed'/></svg>" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%237c3aed'/></svg>" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f5f4fb; --panel:#ffffff; --panel2:#faf9fe; --line:#e8e5f2;
    --violet:#7c3aed; --violet2:#6d34d6; --glow:rgba(124,58,237,.22);
    --txt:#211c34; --muted:#6b6580; --faint:#9c96ad;
    --green:#0f9d63; --amber:#b67c08; --red:#dc3b4b; --blue:#2f7fd6; --radius:18px;
    --sh:0 1px 2px rgba(40,25,80,.04), 0 14px 34px -20px rgba(70,45,130,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;color:var(--txt);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 600px at 80% -10%,rgba(124,58,237,.18),transparent 60%),radial-gradient(700px 500px at 0% 110%,rgba(99,60,200,.14),transparent 60%),linear-gradient(180deg,#070509,#0a0710 60%,#070509)}
  .wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:22px 18px 90px}
  .sphere{width:34px;height:34px;border-radius:50%;flex:none;background:radial-gradient(circle at 34% 30%,#c7b3ff,#7c3aed 38%,#3a1d80 70%,#160b33);box-shadow:0 0 20px var(--glow),inset 0 0 12px rgba(255,255,255,.25);animation:pulse 5s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 16px var(--glow),inset 0 0 12px rgba(255,255,255,.22)}50%{box-shadow:0 0 30px var(--glow),inset 0 0 14px rgba(255,255,255,.32)}}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .topbar b{font-weight:700;letter-spacing:.26em;font-size:14px}
  .wpill{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-size:12.5px;background:var(--panel);border:1px solid var(--line);padding:7px 12px;border-radius:999px;backdrop-filter:blur(10px)}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.g{background:var(--green);box-shadow:0 0 9px var(--green)} .dot.a{background:var(--amber);box-shadow:0 0 9px var(--amber)} .dot.r{background:var(--red);box-shadow:0 0 9px var(--red)}
  .hello{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px}
  .hello .s{display:block;font-size:13.5px;color:var(--muted);font-weight:400;margin-top:5px}
  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:13px 14px;backdrop-filter:blur(12px)}
  .kpi .n{font-size:24px;font-weight:700;line-height:1}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px}
  /* sections */
  .sec{margin:26px 0 10px;display:flex;align-items:center;gap:10px}
  .sec h2{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
  .sec .c{font-size:12px;color:var(--faint)}
  .sec .r{margin-left:auto;font-size:12.5px;color:var(--violet2);cursor:pointer}
  /* customer rows */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);backdrop-filter:blur(14px);overflow:hidden}
  .crow{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:.15s}
  .crow:last-child{border-bottom:0}
  .crow:hover,.crow:active{background:rgba(255,255,255,.04)}
  .crow .ava{width:42px;height:42px;border-radius:12px;flex:none;display:grid;place-items:center;font-weight:700;font-size:16px;color:#fff;background:linear-gradient(140deg,#6d34d6,#3a1d80)}
  .crow .nm{font-size:15px;font-weight:600;line-height:1.25}
  .crow .mt{font-size:12.5px;color:var(--faint);margin-top:2px}
  .crow .sig{margin-left:auto;text-align:right;flex:none}
  .pill{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .p-red{background:rgba(255,107,129,.16);color:var(--red)} .p-amber{background:rgba(255,207,107,.16);color:var(--amber)}
  .p-violet{background:rgba(124,58,237,.2);color:var(--violet2)} .p-blue{background:rgba(124,197,255,.14);color:var(--blue)}
  .p-green{background:rgba(70,229,160,.15);color:var(--green)} .p-muted{background:rgba(255,255,255,.05);color:var(--faint)}
  .crow .chev{color:var(--faint);font-size:18px;margin-left:4px}
  .needhero{border:1px solid rgba(255,107,129,.25);box-shadow:0 0 0 1px rgba(255,107,129,.06),0 22px 50px -34px rgba(0,0,0,.9)}
  .empty{color:var(--faint);font-size:13.5px;text-align:center;padding:28px 18px;line-height:1.55}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
  .kpi,.wcard,.appcard,.card{animation:fadeUp .34s cubic-bezier(.2,.7,.3,1) both}
  #home,#ws{animation:fadeUp .28s ease both}
  .crow{transition:background .15s ease, transform .12s ease}
  .crow:active{transform:scale(.992)}
  .kpi{transition:transform .12s ease, border-color .2s ease}
  .kpi:active{transform:scale(.97)}
  #loader{position:fixed;inset:0;z-index:45;display:none;place-items:center;background:radial-gradient(700px 500px at 50% 30%,rgba(124,58,237,.12),var(--bg))}
  #loader .sphere{width:52px;height:52px;margin:0 auto 18px}
  #loader p{color:var(--muted);font-size:13.5px;letter-spacing:.02em;animation:breathe 2s ease-in-out infinite}
  .search{width:100%;padding:12px 15px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff;font-family:inherit;font-size:14px;margin-bottom:4px}
  /* ---- customer workspace ---- */
  #ws{display:none}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--violet2);font-size:14px;cursor:pointer;margin-bottom:16px}
  .wsHead{display:flex;align-items:flex-start;gap:15px;margin-bottom:6px}
  .wsHead .ava{width:56px;height:56px;border-radius:16px;flex:none;display:grid;place-items:center;font-weight:700;font-size:22px;background:linear-gradient(140deg,#6d34d6,#3a1d80)}
  .wsHead h1{font-size:23px;font-weight:700;letter-spacing:-.01em;line-height:1.15}
  .wsHead .meta{font-size:13px;color:var(--muted);margin-top:4px}
  .banner{margin:16px 0;padding:14px 16px;border-radius:14px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px}
  .b-red{background:rgba(255,107,129,.12);border:1px solid rgba(255,107,129,.3);color:#ffd0d7}
  .b-blue{background:rgba(124,197,255,.1);border:1px solid rgba(124,197,255,.25);color:#cfeaff}
  .b-amber{background:rgba(255,207,107,.1);border:1px solid rgba(255,207,107,.28);color:#ffe9bd}
  .b-violet{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:#d9c9ff}
  .acts{display:flex;gap:9px;flex-wrap:wrap;margin:14px 0 6px}
  .btn{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--txt);padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:rgba(255,255,255,.09)}
  .btn.primary{background:linear-gradient(90deg,var(--violet),#6d34d6);border-color:transparent;color:#fff;box-shadow:0 10px 26px -12px var(--glow)}
  .btn.good{background:linear-gradient(90deg,rgba(70,229,160,.22),rgba(70,229,160,.08));border-color:rgba(70,229,160,.3);color:#c5f7e0}
  .btn.ghost{background:transparent}
  .wcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:17px;backdrop-filter:blur(14px);margin-top:14px}
  .wcard h3{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;display:flex;align-items:center;gap:8px}
  .wcard h3 .soon{margin-left:auto;font-size:10.5px;color:var(--faint);text-transform:none;letter-spacing:0;font-weight:400}
  .kv{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
  .kv:last-child{border:0} .kv .k{color:var(--muted);width:96px;flex:none} .kv a{color:var(--violet2);text-decoration:none}
  .prev{width:100%;height:260px;border:1px solid var(--line);border-radius:12px;background:#0c0913;display:block}
  .tl .ev{display:flex;gap:12px;padding:11px 2px;border-bottom:1px solid rgba(255,255,255,.045)}
  .tl .ev:last-child{border:0}
  .tl .tdot{width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:14px;background:rgba(124,58,237,.14);border:1px solid var(--line)}
  .tl b{font-size:13.5px;display:block} .tl .t{margin-left:auto;font-size:11.5px;color:var(--faint);white-space:nowrap}
  textarea{width:100%;min-height:90px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;color:#fff;font-family:inherit;font-size:14px;padding:12px;resize:vertical}
  .savebar{display:flex;align-items:center;gap:10px;margin-top:9px} .savebar .ok{font-size:12.5px;color:var(--green)}
  .soonbox{color:var(--faint);font-size:13px;line-height:1.5}
  .journey{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:4px}
  .jstep{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:62px;flex:none}
  .jstep .jd{width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--line)}
  .jstep.on .jd{background:var(--violet);box-shadow:0 0 11px var(--glow);border-color:transparent}
  .jstep.cur .jd{background:var(--green);box-shadow:0 0 12px var(--green);border-color:transparent}
  .jstep .jl{font-size:10.5px;color:var(--faint);text-align:center;line-height:1.25}
  .jstep.on .jl,.jstep.cur .jl{color:var(--txt)}
  .jstep i{font-style:normal;font-size:8.5px;color:var(--faint);display:block}
  .jline{flex:none;width:18px;height:2px;background:rgba(255,255,255,.08);margin-top:7px}
  .jline.on{background:var(--violet)}
  .vtog{display:inline-flex;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;margin-bottom:14px}
  .vtog button{border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:999px;cursor:pointer}
  .vtog button.sel{background:var(--violet);color:#fff}
  .inttag{margin-left:auto;font-size:9.5px;color:var(--faint);text-transform:none;letter-spacing:0;border:1px solid var(--line);padding:1px 8px;border-radius:999px}
  .custbanner{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:#d9c9ff;padding:11px 15px;border-radius:13px;font-size:13px;margin-bottom:14px;display:none}
  #ws.ascust .custbanner{display:block}
  .custonly{display:none}
  #ws.ascust .int{display:none!important}
  #ws.ascust .acts.custonly{display:flex}
  .obx{width:22px;height:22px;border-radius:7px;border:1px solid var(--line);display:inline-grid;place-items:center;font-size:13px;color:#fff;flex:none}
  .obx.on{background:var(--green);border-color:transparent;color:#06210f;font-weight:700}
  /* login */
  .gate{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:radial-gradient(800px 600px at 50% 0%,rgba(124,58,237,.18),#070509)}
  .gate .box{width:340px;max-width:90vw;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:34px 28px;backdrop-filter:blur(18px)}
  .gate .sphere{width:58px;height:58px;margin:0 auto 18px} .gate b{letter-spacing:.3em;font-size:17px} .gate p{color:var(--muted);font-size:13px;margin:8px 0 22px}
  .gate input{width:100%;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff;font-family:inherit;font-size:14px;margin-bottom:10px}
  .gate button{width:100%;padding:13px;border:0;border-radius:12px;cursor:pointer;font-weight:600;font-size:14px;background:linear-gradient(90deg,var(--violet),#6d34d6);color:#fff;font-family:inherit}
  .gate .msg{font-size:12.5px;color:var(--amber);margin-top:12px;min-height:16px}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.wrap{padding:18px 14px 96px}.hello{font-size:22px}.btn{padding:13px 16px}.crow{padding:16px 15px}}
  /* ===== Premium light theme ===== */
  body{background:var(--bg);color:var(--txt)}
  body::before{background:radial-gradient(900px 620px at 82% -12%,rgba(124,58,237,.07),transparent 60%),radial-gradient(720px 520px at -5% 108%,rgba(99,60,200,.06),transparent 60%),linear-gradient(180deg,#f7f6fc,#f3f1fa 60%,#f5f4fb)}
  .panel,.card,.kpi,.wcard{background:#fff;border:1px solid var(--line);box-shadow:var(--sh);backdrop-filter:none}
  .wpill{background:#fff;border:1px solid var(--line);box-shadow:var(--sh);backdrop-filter:none}
  .crow{border-bottom:1px solid #f0eef7}
  .crow:hover,.crow:active{background:#f8f6fe}
  .kpi:hover{border-color:#d9d3ee}
  .p-muted{background:#f0eef6;color:var(--faint)}
  .p-red{background:#fdeaec;color:#c5303f} .p-amber{background:#fcf2dd;color:#9a6a06}
  .p-violet{background:#f1ebff;color:var(--violet2)} .p-blue{background:#e8f2fc;color:#1f6cc0} .p-green{background:#e3f6ee;color:#0c7a4c}
  .needhero{border:1px solid #f6d2d7;box-shadow:0 1px 2px rgba(40,25,80,.04),0 18px 40px -24px rgba(220,60,75,.32)}
  .search{background:#fff;border:1px solid var(--line);color:var(--txt);box-shadow:var(--sh)}
  .search::placeholder{color:var(--faint)}
  .btn{background:#fff;border:1px solid var(--line);color:var(--txt);box-shadow:0 1px 2px rgba(40,25,80,.04)}
  .btn:hover{background:#f6f4fc}
  .btn.primary{background:linear-gradient(92deg,var(--violet),#6d34d6);border-color:transparent;color:#fff;box-shadow:0 12px 26px -12px var(--glow)}
  .btn.good{background:#e7f7ef;border-color:#bce7d4;color:#0c7a4c} .btn.good:hover{background:#dcf3e7}
  .btn.ghost{background:transparent;box-shadow:none}
  .b-red{background:#fdecee;border:1px solid #f6cdd2;color:#a8313d}
  .b-blue{background:#eaf3fc;border:1px solid #cfe3f6;color:#1d5e9e}
  .b-amber{background:#fcf4e2;border:1px solid #f0e0b8;color:#8a6206}
  .b-violet{background:#f2ecff;border:1px solid #e0d2fb;color:#5a36b0}
  .kv{border-bottom:1px solid #f1eff7} .kv a,.back,.sec .r{color:var(--violet2)}
  .prev{background:#fff;border:1px solid var(--line)}
  .tl .ev{border-bottom:1px solid #f1eff7}
  .tl .tdot{background:#f1ebff;border:1px solid var(--line)}
  textarea{background:#faf9fe;border:1px solid var(--line);color:var(--txt)}
  .jstep .jd{background:#e9e5f3;border:1px solid var(--line)}
  .jline{background:#e6e2f0}
  .vtog{background:#efecf8;border:1px solid var(--line)}
  .inttag{border:1px solid var(--line);color:var(--faint)}
  .custbanner{background:#f2ecff;border:1px solid #e0d2fb;color:#5a36b0}
  .obx{background:#fff;border:1px solid var(--line);color:var(--violet)}
  .obx.on{background:var(--green);border-color:transparent;color:#fff}
  .gate{background:radial-gradient(800px 600px at 50% -5%,rgba(124,58,237,.1),#f4f3fb)}
  .gate .box{background:#fff;border:1px solid var(--line);box-shadow:0 30px 70px -30px rgba(70,45,130,.35);backdrop-filter:none}
  .gate input{background:#faf9fe;border:1px solid var(--line);color:var(--txt)} .gate b{color:var(--txt)}
  #loader{background:radial-gradient(700px 500px at 50% 30%,rgba(124,58,237,.08),#f5f4fb)} #loader p{color:var(--muted)}
  .crow .ava,.wsHead .ava{box-shadow:0 8px 18px -8px var(--glow)}
  @keyframes shimmer{0%{background-position:-320px 0}100%{background-position:320px 0}}
  .skel{background:#ece9f4;background-image:linear-gradient(90deg,#ece9f4,#f5f3fb,#ece9f4);background-size:600px 100%;border-radius:8px;animation:shimmer 1.25s linear infinite}
  #toast{position:fixed;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translate(-50%,16px);background:#211c34;color:#fff;padding:13px 20px;border-radius:14px;font-size:14px;font-weight:500;box-shadow:0 18px 44px -14px rgba(60,40,120,.5);opacity:0;pointer-events:none;transition:.3s cubic-bezier(.2,.7,.3,1);z-index:60;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="box">
    <div class="sphere"></div><b>UNVEILED</b><p>Command Center</p>
    <input id="email" type="email" placeholder="you@email.com" autocomplete="username" />
    <input id="pass" type="password" placeholder="Password" autocomplete="current-password" />
    <button onclick="signIn()">Enter</button>
    <div class="msg" id="gmsg"></div>
    <p style="margin:14px 0 0"><a id="magic" style="color:var(--violet2);cursor:pointer;font-size:12.5px">Email me a sign-in link instead</a></p>
  </div>
</div>

<div id="loader"><div style="text-align:center"><div class="sphere"></div><p>Bringing your company online…</p></div></div>
<div id="toast"></div>

<div class="wrap" id="app" style="display:none">
  <!-- HOME -->
  <div id="home">
    <div class="topbar"><div class="sphere"></div><b>UNVEILED</b><div class="wpill" id="wpill"><span class="dot a"></span><span id="wlbl">…</span></div></div>
    <div class="hello">Good <span id="part">day</span>, Moe.<span class="s" id="sub">Loading your company…</span></div>
    <div class="kpis" id="kpis"></div>

    <div class="sec"><h2>Needs you now</h2><span class="c" id="needCount"></span></div>
    <div class="card needhero" id="need"><div class="empty">Loading…</div></div>

    <input class="search" id="search" placeholder="Search customers…" oninput="renderHome()" />
    <div id="groups"></div>
  </div>

  <!-- CUSTOMER WORKSPACE -->
  <div id="ws"></div>
</div>

<script>
const CFG={url:'https://eosvftmiwndmctrqprtz.supabase.co',key:'sb_publishable_BYxqF1ViwTrfaI4RGhciVw_kgbt-pSA'};
const ONCE=2000, MO=200; // ESTIMATE assumptions — not confirmed pricing
const sb=supabase.createClient(CFG.url,CFG.key);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ago=d=>{if(!d)return'';const s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';};
const clock=d=>new Date(d).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const initials=n=>(n||'?').split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
let LEADS=[], WQ=[], ACTS=[], BEAT=null, PKGS=[], FILTER=null;

// ---- auth ----
async function signIn(){const email=$('email').value.trim(),password=$('pass').value;$('gmsg').textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password});if(error){$('gmsg').textContent=error.message;return;}boot();}
$('magic').onclick=async()=>{const email=$('email').value.trim();if(!email){$('gmsg').textContent='Enter your email first.';return;}
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split('#')[0]}});$('gmsg').textContent=error?error.message:'Check your email for a sign-in link.';};
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')signIn();});

async function boot(){const {data:{session}}=await sb.auth.getSession();
  if(!session){$('gate').style.display='grid';$('app').style.display='none';$('loader').style.display='none';return;}
  $('gate').style.display='none';$('app').style.display='block';
  const h=new Date().getHours();$('part').textContent=h<12?'morning':h<18?'afternoon':'evening';
  if(!location.hash) renderSkeleton();
  await load(); route();
  if(!window._cc_iv){ window._cc_iv=setInterval(()=>{ if(!location.hash){ load().then(()=>{ if(!location.hash) renderHome(); }); } },45000); }
}

async function q(path){const {data:{session}}=await sb.auth.getSession();
  const r=await fetch(CFG.url+'/rest/v1/'+path,{headers:{apikey:CFG.key,Authorization:'Bearer '+session.access_token}});return r.ok?r.json():[];}

// ---- signal logic: turns status into a human decision ----
function signal(l){
  const s=l.status;
  if(s==='PREVIEW READY') return {k:'approve',label:'Waiting on your approval',cls:'red',rank:0};
  if(s==='CHANGES REQUESTED') return {k:'fix',label:'Needs changes',cls:'amber',rank:1};
  if(s==='BUILDING') return {k:'build',label:'In production',cls:'violet',rank:3};
  if(s==='PREVIEW DELIVERED') return {k:'wait',label:'Waiting on customer',cls:'blue',rank:4};
  if(s==='APPROVED') return {k:'won',label:'Approved',cls:'green',rank:2};
  if(s==='QUALIFIED') return {k:'ready',label:'Ready to build',cls:'violet',rank:5};
  if(s==='NEW LEAD') return l.email?{k:'new',label:'New lead',cls:'muted',rank:6}:{k:'call',label:'Call to reach',cls:'amber',rank:6};
  if(s==='LOST') return {k:'lost',label:'Archived',cls:'muted',rank:9};
  return {k:'other',label:s||'—',cls:'muted',rank:8};
}

async function load(){
  try{
    [LEADS,WQ,ACTS,BEAT,PKGS]=await Promise.all([
      q('leads?select=*&order=updated_at.desc&limit=500'),
      q('work_queue?select=status,claimed_at,payload,blocker_reason,result&order=updated_at.desc&limit=200'),
      q('activity_log?select=action,meta,created_at,entity_id&action=neq.heartbeat&order=created_at.desc&limit=400'),
      q('activity_log?select=created_at&action=eq.heartbeat&order=created_at.desc&limit=1').then(r=>r[0]),
      q('service_packages?select=*'),
    ]);
  }catch(e){$('sub').textContent='Could not load: '+e.message;}
}

function workerPill(){
  const age=BEAT?(Date.now()-new Date(BEAT.created_at).getTime())/1000:1e9;
  const pending=WQ.filter(j=>j.status==='pending').length;
  let c='g',t='All caught up';
  if(age<120){ if(pending>0){c='g';t='Production team working';} }
  else { c='a'; t='Production paused'; }
  $('wpill').innerHTML='<span class="dot '+c+'"></span><span>'+t+'</span>';
}

// ---- HOME ----
function route(){ const h=location.hash;
  if(h.startsWith('#c/')){ renderCustomer(h.slice(3)); }
  else { $('ws').style.display='none'; $('home').style.display='block'; renderHome(); }
}
window.addEventListener('hashchange',route);
function setFilter(f){ FILTER=(FILTER===f?null:f); if(FILTER==='pipeline')FILTER=null; renderHome(); window.scrollTo({top:0,behavior:'smooth'}); }

function renderHome(){
  workerPill();
  const appr=LEADS.filter(l=>l.status==='PREVIEW READY');
  const building=WQ.filter(j=>j.status==='running');
  const pending=WQ.filter(j=>j.status==='pending').length;
  const blocked=LEADS.filter(l=>l.status==='CHANGES REQUESTED');
  const pipe=(appr.length+building.length+pending+LEADS.filter(l=>l.status==='QUALIFIED').length)*ONCE;
  $('sub').textContent = (appr.length+building.length+pending) ? (appr.length+' waiting on you · '+building.length+' building · '+pending+' queued') : "You're all caught up. Here's the state of the company.";
  $('kpis').innerHTML=[
    [appr.length,'Waiting approval','approve'],[building.length,'Building','building'],[blocked.length,'Need changes','changes'],['$'+(pipe/1000)+'k','Pipeline (est.)','pipeline']
  ].map(([n,l,f])=>`<div class="kpi" style="cursor:pointer" onclick="setFilter('${f}')"><div class="n">${n}</div><div class="l">${l} ›</div></div>`).join('');

  // Every card is alive: a KPI click drills into exactly that cohort (no dead ends)
  const hdr=document.querySelector('#home .sec h2');
  if(FILTER && FILTER!=='pipeline'){
    const map={approve:l=>l.status==='PREVIEW READY',building:l=>l.status==='BUILDING',changes:l=>l.status==='CHANGES REQUESTED'};
    const title={approve:'Waiting on your approval',building:'In production',changes:'Need changes'};
    const rows=LEADS.filter(map[FILTER]||(()=>false));
    hdr.textContent=title[FILTER]||'Filtered';
    $('needCount').innerHTML='<span style="cursor:pointer;color:var(--violet2)" onclick="setFilter(null)">‹ show everything</span>';
    $('need').innerHTML=rows.length?rows.map(FILTER==='approve'?needRow:rowHTML).join(''):'<div class="empty">None right now.</div>';
    $('groups').innerHTML=''; return;
  }
  hdr.textContent='Needs you now';

  // needs you = approvals + changes-needed (the truly actionable)
  const need=[...appr,...blocked].sort((a,b)=>signal(a).rank-signal(b).rank);
  $('needCount').textContent=need.length?need.length+' to decide':'all clear';
  $('need').innerHTML = need.length ? need.map(needRow).join('')
    : `<div class="empty">You're all caught up — nothing needs a decision right now.<br>Finished websites and anything that needs your call will land right here.</div>`;

  // all customers grouped, filtered by search
  const term=($('search').value||'').toLowerCase();
  const visible=LEADS.filter(l=>!term || (l.business_name||'').toLowerCase().includes(term));
  const groups=[
    ['In production',l=>l.status==='BUILDING'],
    ['Won — onboarding',l=>l.status==='APPROVED'],
    ['Waiting on customer',l=>l.status==='PREVIEW DELIVERED'],
    ['Ready to build',l=>l.status==='QUALIFIED'],
    ['Outreach backlog',l=>l.status==='NEW LEAD'],
    ['Archived',l=>l.status==='LOST'],
  ];
  let html='';
  for(const [name,fn] of groups){
    const rows=visible.filter(fn); if(!rows.length) continue;
    html+=`<div class="sec"><h2>${name}</h2><span class="c">${rows.length}</span></div><div class="card">${rows.slice(0,40).map(rowHTML).join('')}</div>`;
  }
  $('groups').innerHTML=html||'';
}

function renderSkeleton(){
  $('kpis').innerHTML=[0,0,0,0].map(()=>`<div class="kpi"><div class="skel" style="height:24px;width:42%"></div><div class="skel" style="height:11px;width:74%;margin-top:10px"></div></div>`).join('');
  $('need').innerHTML=[0,0].map(()=>`<div class="crow" style="pointer-events:none"><div class="skel" style="width:42px;height:42px;border-radius:12px;flex:none"></div><div style="flex:1"><div class="skel" style="height:15px;width:46%"></div><div class="skel" style="height:11px;width:28%;margin-top:8px"></div></div></div>`).join('');
  $('groups').innerHTML='';
  document.querySelector('#home .sec h2').textContent='Needs you now'; $('needCount').textContent='';
}
function toast(msg){ const t=$('toast'); if(!t)return; t.textContent=msg; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),3400); }
function needRow(l){
  const sg=signal(l);
  let quick='<div class="chev">›</div>';
  if(sg.k==='approve') quick=`<button class="btn good" style="padding:8px 14px;font-size:12.5px;flex:none" onclick="event.stopPropagation();decide('${l.id}','APPROVED',this)">Approve</button>`;
  return `<div class="crow" onclick="location.hash='#c/${l.id}'">
    <div class="ava">${esc(initials(l.business_name))}</div>
    <div><div class="nm">${esc(l.business_name||'Untitled')}</div><div class="mt">${esc(l.industry||l.source||'')} · ${ago(l.updated_at)}</div></div>
    <div class="sig"><span class="pill p-${sg.cls}">${sg.label}</span></div>${quick}
  </div>`;
}
function rowHTML(l){
  const sg=signal(l);
  return `<div class="crow" onclick="location.hash='#c/${l.id}'">
    <div class="ava">${esc(initials(l.business_name))}</div>
    <div><div class="nm">${esc(l.business_name||'Untitled')}</div><div class="mt">${esc(l.industry||l.source||'')} · ${ago(l.updated_at)}</div></div>
    <div class="sig"><span class="pill p-${sg.cls}">${sg.label}</span></div><div class="chev">›</div>
  </div>`;
}

// ---- CUSTOMER WORKSPACE ----
function renderCustomer(id){
  const l=LEADS.find(x=>x.id===id); if(!l){location.hash='';return;}
  $('home').style.display='none'; $('ws').style.display='block'; window.scrollTo(0,0);
  const sg=signal(l);
  const myacts=ACTS.filter(a=>a.entity_id===id);
  const job=WQ.find(j=>j.payload&&j.payload.lead_id===id);
  const phone=l.phone||''; const email=l.email||'';

  // decision banner
  let banner='';
  if(sg.k==='approve') banner=`<div class="banner b-red">⚑ This finished website is waiting on your approval. Approving sends the reveal to the customer.</div>`;
  else if(sg.k==='wait') banner=`<div class="banner b-blue">⏳ Reveal sent — we're waiting on the customer to reply. ${l.reveal_sent_at?'Sent '+ago(l.reveal_sent_at):''}</div>`;
  else if(sg.k==='fix') banner=`<div class="banner b-amber">✎ This build needs changes before it can go out.</div>`;
  else if(sg.k==='build') banner=`<div class="banner b-violet">⚙ In production now. No action needed from you yet.</div>`;
  else if(sg.k==='call') banner=`<div class="banner b-amber">📞 No email on file — this customer is best reached by phone.</div>`;

  // contextual actions — team sees internal controls; customer sees only their own
  let teamActs='', custActs='';
  if(l.preview_url){ const open=`<a class="btn primary" href="${esc(l.preview_url)}" target="_blank">Open website ↗</a>`; teamActs+=open; custActs+=open; }
  if(sg.k==='approve'){ teamActs+=`
    <button class="btn good" onclick="decide('${id}','APPROVED',this)">Approve &amp; send reveal</button>
    <button class="btn" onclick="decide('${id}','CHANGES REQUESTED',this)">Request changes</button>
    <button class="btn ghost" onclick="decide('${id}','LOST',this)">Pass</button>`;
  }
  if(phone) teamActs+=`<a class="btn" href="tel:${esc(phone.replace(/[^0-9+]/g,''))}">📞 Call</a>`;
  if(email) teamActs+=`<a class="btn" href="mailto:${esc(email)}">✉ Email</a>`;
  custActs+=`<button class="btn" onclick="alert('Change requests route to your team once customer login ships.')">Request a change</button>`;

  $('ws').innerHTML=`
    <div class="back" onclick="location.hash=''">‹ All customers</div>
    <div class="vtog"><button class="sel" onclick="setView('team',this)">Team view</button><button onclick="setView('customer',this)">Customer view</button></div>
    <div class="custbanner">👁 Customer view — this is exactly what <b>${esc(l.business_name||'this customer')}</b> will see when they log in. Same workspace, fewer doors.</div>
    <div class="wsHead">
      <div class="ava">${esc(initials(l.business_name))}</div>
      <div><h1>${esc(l.business_name||'Untitled')}</h1>
      <div class="meta">${[l.industry,l.location].filter(Boolean).map(esc).join(' · ')||'—'}</div></div>
    </div>
    ${banner}
    <div class="acts int">${teamActs}</div>
    <div class="acts custonly">${custActs}</div>
    ${journeyHTML(l)}

    ${l.preview_url?`<div class="wcard"><h3>Website</h3><iframe class="prev" src="${esc(l.preview_url)}" loading="lazy"></iframe>
      <div style="margin-top:10px"><a class="btn" href="${esc(l.preview_url)}" target="_blank">Open full site ↗</a></div></div>`:''}

    ${onboardingHTML(l)}

    <div class="wcard int"><h3>Production <span class="inttag">Team only</span></h3>
      ${job?`<div class="kv"><span class="k">Status</span><span>${esc(job.status)}${job.status==='running'&&job.claimed_at?' · '+ago(job.claimed_at).replace(' ago',' in build'):''}</span></div>
      ${job.blocker_reason?`<div class="kv"><span class="k">Blocked</span><span>${esc(job.blocker_reason)}</span></div>`:''}
      ${job.result&&job.result.preview_url?`<div class="kv"><span class="k">Delivered</span><a href="${esc(job.result.preview_url)}" target="_blank">live link ↗</a></div>`:''}`
      :`<div class="soonbox">No build job on record for this customer yet.</div>`}
    </div>

    <div class="wcard int"><h3>Contact <span class="inttag">Team only</span></h3>
      <div class="kv"><span class="k">Email</span><span>${email?`<a href="mailto:${esc(email)}">${esc(email)}</a>`:'<span style="color:var(--faint)">none on file</span>'}</span></div>
      <div class="kv"><span class="k">Phone</span><span>${phone?`<a href="tel:${esc(phone)}">${esc(phone)}</a>`:'<span style="color:var(--faint)">none on file</span>'}</span></div>
      ${l.contact_name?`<div class="kv"><span class="k">Contact</span><span>${esc(l.contact_name)}</span></div>`:''}
      ${l.website?`<div class="kv"><span class="k">Old site</span><a href="${esc(l.website)}" target="_blank">${esc(l.website)} ↗</a></div>`:''}
      <div class="kv"><span class="k">Came from</span><span>${esc(l.channel||l.source||'—')}${l.campaign?' · '+esc(l.campaign):''}</span></div>
      ${l.offer?`<div class="kv"><span class="k">Offer</span><span>${esc(l.offer)}</span></div>`:''}
      ${l.package?`<div class="kv"><span class="k">Package</span><span style="text-transform:capitalize">${esc(l.package)}</span></div>`:''}
    </div>

    <div class="wcard"><h3>History</h3>
      <div class="tl">${myacts.length?myacts.map(a=>`<div class="ev"><div class="tdot">•</div><div><b>${esc(humanAction(a))}</b></div><div class="t">${clock(a.created_at)}</div></div>`).join('')
        :`<div class="soonbox">No recorded interactions yet. Build steps, reveals, and replies will appear here.</div>`}</div>
    </div>

    <div class="wcard int"><h3>Notes <span class="inttag">Team only · private</span></h3>
      <textarea id="notes" placeholder="Your private notes on this customer…">${esc(l.cc_notes||'')}</textarea>
      <div class="savebar"><button class="btn" onclick="saveNotes('${id}',this)">Save note</button><span class="ok" id="noteok"></span></div>
    </div>

    <div class="wcard"><h3>Files & assets <span class="inttag int">not instrumented</span></h3><div class="soonbox">No files yet.<span class="int"> Storage isn't wired in yet — logos, photos, and brand files will live here once connected.</span></div></div>
    <div class="wcard int"><h3>Emails & engagement <span class="inttag">Team only</span><span class="soon" style="margin-left:8px">not instrumented</span></h3><div class="soonbox">Per-customer email threads and open/click tracking aren't connected yet, so I won't show "opened 3 times" until we can measure it. Lights up with the email-tracking instrumentation.</div></div>
    <div class="wcard"><h3>Invoices & subscription <span class="inttag int">not instrumented</span></h3><div class="soonbox">No invoices yet.<span class="int"> Billing (Stripe) isn't connected yet; invoices and subscription status will appear here once it is.</span></div></div>
  `;
}

function onboardingHTML(l){
  const pkg=(PKGS&&PKGS.find(p=>p.name===(l.package||'website')))||(PKGS&&PKGS[0]); if(!pkg)return'';
  const def=pkg.definition||{}; const items=def.what_we_need||[]; const st=l.onboarding||{};
  const done=items.filter(it=>st[it.k]).length;
  return `<div class="wcard"><h3>Onboarding &amp; requirements <span class="soon">${done}/${items.length} done</span></h3>
    <div class="soonbox" style="margin-bottom:12px">${esc(def.next||'')}</div>
    ${items.map(it=>`<div class="kv" style="cursor:pointer;align-items:center" onclick="toggleOnb('${l.id}','${esc(it.k)}',this)">
      <span class="obx ${st[it.k]?'on':''}">${st[it.k]?'✓':''}</span>
      <span style="flex:1">${esc(it.label)}</span><span class="inttag" style="margin:0">${esc(it.kind||'')}</span></div>`).join('')}
  </div>`;
}
async function toggleOnb(id,k,row){
  const l=LEADS.find(x=>x.id===id); if(!l)return; l.onboarding=l.onboarding||{}; l.onboarding[k]=!l.onboarding[k];
  const box=row.querySelector('.obx'); box.classList.toggle('on',l.onboarding[k]); box.textContent=l.onboarding[k]?'✓':'';
  await sb.from('leads').update({onboarding:l.onboarding}).eq('id',id);
  const pkg=(PKGS.find(p=>p.name===(l.package||'website'))||PKGS[0]); const items=(pkg&&pkg.definition.what_we_need)||[];
  const done=items.filter(it=>l.onboarding[it.k]).length; const s=row.closest('.wcard').querySelector('.soon'); if(s)s.textContent=done+'/'+items.length+' done';
}

function setView(v,btn){
  $('ws').classList.toggle('ascust', v==='customer');
  document.querySelectorAll('.vtog button').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); window.scrollTo(0,0);
}

function journeyHTML(l){
  const s=l.status;
  const built=['BUILDING','QA','PREVIEW READY','PREVIEW DELIVERED','APPROVED'].includes(s)||!!l.preview_url;
  const preview=!!l.preview_url||['PREVIEW READY','PREVIEW DELIVERED','APPROVED'].includes(s);
  const sent=['PREVIEW DELIVERED','APPROVED'].includes(s)||!!l.reveal_sent_at;
  const approved=s==='APPROVED';
  const steps=[
    {l:'Lead',on:true},{l:'Built',on:built},{l:'Preview',on:preview},{l:'Reveal sent',on:sent},
    {l:'Opened',soon:true},{l:'Replied',soon:true},{l:'Approved',on:approved},{l:'Paid',soon:true},{l:'Live client',soon:true}
  ];
  // current = last "on" step
  let cur=-1; steps.forEach((st,i)=>{if(st.on)cur=i;});
  let out='';
  steps.forEach((st,i)=>{
    if(i>0) out+=`<span class="jline ${steps[i-1].on&&st.on?'on':''}"></span>`;
    const cls=i===cur?'cur':(st.on?'on':'');
    out+=`<div class="jstep ${cls}"><span class="jd"></span><span class="jl">${st.l}${st.soon?'<i>not tracked</i>':''}</span></div>`;
  });
  return `<div class="wcard"><h3>Customer journey</h3><div class="journey">${out}</div>
    <div class="soonbox" style="margin-top:11px">Greyed steps (opened, replied, paid, live) aren't instrumented yet. I won't light them up until we can measure them honestly — see the blind-spot report for how we wire each one.</div></div>`;
}

function humanAction(a){
  const b=(a.meta&&(a.meta.business||a.meta.slug))||'';
  const m={build_started:'Started building the website',homepage_complete:'Website draft completed',qa_passed:'Passed quality checks',deployed:'Website went live (preview)',job_completed:'Ready for your approval',build_blocked:'Build blocked: '+((a.meta&&a.meta.reason)||''),auto_enqueued:'Entered the production pipeline',reveal_sent:'Reveal sent to customer'};
  return m[a.action]||a.action.replace(/_/g,' ');
}

async function decide(id,status,btn){btn.textContent='…';btn.disabled=true;
  const nm=(LEADS.find(x=>x.id===id)||{}).business_name||'Customer';
  const {error}=await sb.from('leads').update({status,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){btn.textContent='!';toast('Could not save — '+error.message);btn.disabled=false;return;}
  await load(); route();
  toast({APPROVED:'Approved ✓   The reveal is on its way to '+nm+'.','CHANGES REQUESTED':'Sent back for changes — '+nm+' left your approval queue.',LOST:nm+' passed — moved to Archived.'}[status]||'Saved.');
}

async function saveNotes(id,btn){const v=$('notes').value;btn.textContent='Saving…';
  const {error}=await sb.from('leads').update({cc_notes:v,updated_at:new Date().toISOString()}).eq('id',id);
  btn.textContent='Save note';$('noteok').textContent=error?('Error: '+error.message):'Saved ✓';
  const li=LEADS.find(x=>x.id===id);if(li)li.cc_notes=v;setTimeout(()=>$('noteok').textContent='',2500);}

sb.auth.onAuthStateChange((_e,s)=>{if(s)boot();});
boot();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/command/sw.js').catch(()=>{}); }
</script>
